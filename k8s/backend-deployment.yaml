apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 149465511648.dkr.ecr.us-east-2.amazonaws.com/tc2-dev-backend:5129dc0
          ports:
            - containerPort: 3000
          env:
            - name: CORS_ORIGIN
              value: "*"    
          resources:
            requests:
              cpu: "256m"
              memory: "512Mi"
            limits:
              cpu: "512m"
              memory: "1Gi"
